<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebbShop</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

    <div id="loga">
        <img src="./img/DinosaurWebbShopLogo.jpg" alt="Loga">
    </div>

    <header>
        <h1>ToysNDinos</h1>
    </header>

    <nav>
        <img src="./img/DinosaurAdd.jpg" alt="DinosaurReklam">
    </nav>

    <main>
        <div class="DinosaurPack">
            <img src="./img/DinosaurPack.jpg" alt="DinosaurPacket">
            <p>Pris: 125kr</p>
            <p>DinosaurPacket</p>
            <button type="button" onclick="addToCart('DinosaurPACK - 125kr')">Lägg Till</button>
        </div>

        <div class="Rex">
            <img src="./img/TyranosaurusRex.jpg" alt="Rex">
            <p>Pris: 50kr</p>
            <p>Tyranosaurusrex</p>
            <button type="button" onclick="addToCart('Rex - 50kr')">Lägg Till</button>
        </div>

        <div>
            <img src="./img/Triceratopstoy1.jpg" alt="Triceratops">
            <p>Pris: 50kr</p>
            <p>Triceratops</p>
            <button type="button" onclick="addToCart('Triceratops - 50kr')">Lägg Till</button>
        </div>

    </main>

    <aside>
        <h2>Kundvagn</h2>

        <ul id="cartList">
            <!-- Produkter hamnar här -->
        </ul>
    </aside>

    <footer>
        <p>Om oss</p>
        <p>Kontakta oss</p>
        <p>Support</p>
        <!-- om jag har tid ska jag lägga till så man kan tryvcka på dess och komma till en ny sida -->
    </footer>
</body>
</html>
